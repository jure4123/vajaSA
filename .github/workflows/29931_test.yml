name: 29931_test

on:
  push:
    branches: [ "main" ]

jobs:
  testiranje:
    runs-on: self-hosted

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Preveri obstoj testov
        run: |
          if [ ! -f test_main.py ]; then
            echo "TESTI MANJKAJO" > napaka.txt
            exit 1
          else
            echo "" > napaka.txt
          fi

      - name: Run tests
        run: |
          pytest test_main.py 2> napaka.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: napaka
          path: napaka.txt