name: 29931_test

on:
  push:
    branches: [ "main" ]

jobs:
  check_tests:
    name: Preveri obstoj testov
    runs-on: self-hosted

    steps:
      - name: Checkout repozitorija
        uses: actions/checkout@v4

      - name: Preveri testne skripte
        run: |
          echo "Preverjam teste..."
          if ls test*.py 1> /dev/null 2>&1; then
            echo "Teste najdene."
          else
            echo "TESTI MANJKAJO!" | tee napaka.txt
            exit 1
          fi

      - name: Shrani napako kot artefakt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: napaka
          path: napaka.txt

  run_tests:
    name: Zagon testov
    runs-on: self-hosted
    needs: check_tests
    if: success()

    strategy:
      matrix:
        python-version: [3.9, 3.10]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prenesi artefakt
        uses: actions/download-artifact@v4
        with:
          name: napaka

      - name: Preveri napaka.txt
        run: |
          if [ -s napaka.txt ]; then
            echo "Napaka obstaja - prekinjam."
            exit 1
          else
            echo "Ni napak, nadaljujem..."
          fi

      - name: Nastavi Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Namesti odvisnosti
        run: |
          pip install -r requirements.txt

      - name: Zaženi teste
        run: |
          python -m pytest -v