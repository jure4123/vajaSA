name: 29931_test

on:
  push:
    branches: [ "main" ]

jobs:

  preveri_test:
    runs-on: self-hosted

    outputs:
      napaka: ${{ steps.preveri.outputs.napaka }}

    steps:
      - uses: actions/checkout@v4

      - name: Preveri obstoj testov
        id: preveri
        run: |
          if [ ! -f test_main.py ]; then
            echo "TESTI MANJKAJO" > napaka.txt
            echo "napaka=1" >> $GITHUB_OUTPUT
          else
            echo "" > napaka.txt
            echo "napaka=0" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: napaka
          path: napaka.txt


  testiranje:
    needs: preveri_test
    if: needs.preveri_test.outputs.napaka == '0'
    runs-on: self-hosted

    strategy:
      matrix:
        python-version: [3.9, 3.10]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          pytest test_main.py 2> napaka.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: napaka
          path: napaka.txt