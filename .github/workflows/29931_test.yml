# ============================================================
# 29931_test.yml
# GitHub Actions skripta za SPROTNO INTEGRACIJO (CI)
# Naloga: Preveritev testnih skript in izvajanje testov
#
# Avtor: 29931
# Skripta se sproži ob vsakem push na vejo 'main'
# ============================================================

name: 29931 - CI Testiranje

# -----------------------------------------------------------
# KDAJ se skripta sproži:
# - ob vsakem push na vejo main
# -----------------------------------------------------------
on:
  push:
    branches:
      - main

# -----------------------------------------------------------
# POSLI (jobs): skripta ima 2 posla
#   1. preveri-teste  → preveri obstoj testnih skript
#   2. izvedi-teste   → pripravi okolje in požene teste
#      (odvisen od posla 1)
# -----------------------------------------------------------
jobs:

  # ==========================================================
  # POSEL 1: Preveri obstoj testnih skript
  # Naloga: Poišče testne datoteke in napake zapiše v napaka.txt
  # ==========================================================
  preveri-teste:
    name: "Korak 1 - Preveri obstoj testnih skript"
    runs-on: self-hosted   # Teče na našem lastnem runnerju

    steps:
      # -------------------------------------------------------
      # Korak 1.1: Pridobi kodo iz repozitorija
      # -------------------------------------------------------
      - name: Pridobi kodo (checkout)
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # Korak 1.2: Poišči testne datoteke
      # Standardno napako preusmeri v napaka.txt
      # Če testnih datotek ni, bo v napaka.txt zapisana napaka
      # -------------------------------------------------------
      - name: Preveri obstoj testnih skript
        run: |
          echo "=== Iščem testne datoteke (test_*.py ali *_test.py) ==="
          
          # Poiščemo testne datoteke in napako shranimo v napaka.txt
          # '2>' preusmeri stderr v datoteko napaka.txt
          find . -name "test_*.py" -o -name "*_test.py" > najdene_teste.txt 2> napaka.txt
          
          # Preverimo, ali so bile najdene kakšne testne datoteke
          if [ ! -s najdene_teste.txt ]; then
            # Datoteka je prazna - ni testnih skript!
            echo "NAPAKA: V repozitoriju ni najdenih testnih skript!" >> napaka.txt
            echo "Iskani vzorci: test_*.py ali *_test.py" >> napaka.txt
            echo "::error::Testne skripte niso bile najdene v repozitoriju!"
            exit 1
          else
            echo "=== Najdene testne datoteke ==="
            cat najdene_teste.txt
            # napaka.txt ostane prazna - ni napak
            echo "" > napaka.txt
            echo "OK: Testne skripte so bile najdene."
          fi

      # -------------------------------------------------------
      # Korak 1.3: Shrani napaka.txt kot artefakt
      # Artefakt se prenese med posli (job 1 → job 2)
      # -------------------------------------------------------
      - name: Shrani artefakt napaka.txt
        uses: actions/upload-artifact@v4
        # Artefakt shranimo VEDNO - tudi ob napaki (if: always())
        if: always()
        with:
          name: rezultat-preverjanja    # Ime artefakta
          path: napaka.txt              # Datoteka, ki jo shranimo
          retention-days: 7             # Artefakt hranimo 7 dni


  # ==========================================================
  # POSEL 2: Pripravi okolje in poženi teste
  # Naloga: Namesti odvisnosti in izvede teste
  # ODVISEN od posla 1 (needs: preveri-teste)
  # ==========================================================
  izvedi-teste:
    name: "Korak 2 - Izvedi teste"
    runs-on: self-hosted   # Teče na našem lastnem runnerju

    # -------------------------------------------------------
    # Odvisnost: ta posel se zažene ŠELE ko se posel 1 konča
    # Če posel 1 ni uspel, se ta posel NE zažene
    # -------------------------------------------------------
    needs: preveri-teste

    # -------------------------------------------------------
    # MATRICA (matrix): teste izvajamo na več verzijah Pythona
    # To je obvezna uporaba matrice po navodilih naloge!
    # -------------------------------------------------------
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]   # Testiraj na 3 verzijah
      fail-fast: false    # Nadaljuj z ostalimi verzijami, čeprav ena pade

    steps:
      # -------------------------------------------------------
      # Korak 2.1: Pridobi kodo iz repozitorija
      # -------------------------------------------------------
      - name: Pridobi kodo (checkout)
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # Korak 2.2: Prenesi artefakt napaka.txt iz posla 1
      # S tem preverimo, ali je bil posel 1 uspešen
      # -------------------------------------------------------
      - name: Prenesi artefakt napaka.txt iz posla 1
        uses: actions/download-artifact@v4
        with:
          name: rezultat-preverjanja    # Ime artefakta (enako kot zgoraj)
          path: ./artefakti             # Shranimo v mapo artefakti/

      # -------------------------------------------------------
      # Korak 2.3: Preveri vsebino napaka.txt
      # Če datoteka ni prazna → prekini posel
      # -------------------------------------------------------
      - name: Preveri vsebino napaka.txt
        run: |
          echo "=== Vsebina napaka.txt iz posla 1 ==="
          cat ./artefakti/napaka.txt
          
          # Preverimo, ali je napaka.txt prazna
          if [ -s ./artefakti/napaka.txt ]; then
            echo "::error::Posel 1 je zaznal napako. Prekinjam izvajanje testov!"
            exit 1
          fi
          
          echo "OK: napaka.txt je prazna. Nadaljujem z izvajanjem testov."

      # -------------------------------------------------------
      # Korak 2.4: Nastavi Python okolje (verzija iz matrice)
      # -------------------------------------------------------
      - name: "Nastavi Python ${{ matrix.python-version }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # -------------------------------------------------------
      # Korak 2.5: Namesti odvisnosti iz requirements.txt
      # -------------------------------------------------------
      - name: Namesti odvisnosti
        run: |
          echo "=== Nameščam odvisnosti za Python ${{ matrix.python-version }} ==="
          python -m pip install --upgrade pip
          
          # Namesti odvisnosti iz requirements.txt (če datoteka obstaja)
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
            echo "OK: Odvisnosti iz requirements.txt so nameščene."
          else
            echo "OPOZORILO: requirements.txt ne obstaja, preskačem."
          fi

      # -------------------------------------------------------
      # Korak 2.6: Poženi teste z unittest
      # -------------------------------------------------------
      - name: "Poženi teste (Python ${{ matrix.python-version }})"
        run: |
          echo "=== Zaganjam teste na Python ${{ matrix.python-version }} ==="
          
          # Poženemo vse testne datoteke z unittest odkrivanjem
          python -m unittest discover -s . -p "test_*.py" -v
          
          echo "=== Testi uspešno zaključeni na Python ${{ matrix.python-version }} ==="