name: 29931_deploy

on:
  workflow_run:
    workflows: ["29931_test"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prenesi artefakt napaka
        uses: actions/download-artifact@v4
        with:
          name: napaka
          path: .

      - name: Preveri da ni napake
        run: |
          if [ -s napaka.txt ]; then
            echo "Napaka obstaja - deploy se prekine"
            exit 1
          fi

      - name: Login v DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USER }}/moja-aplikacija:latest .

      - name: Push na DockerHub
        run: |
          docker push ${{ secrets.DOCKERHUB_USER }}/moja-aplikacija:latest