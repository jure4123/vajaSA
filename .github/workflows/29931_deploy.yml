name: CD - Docker Deploy

on:
  workflow_run:
    workflows: ["CI - Testiranje"]
    types:
      - completed

jobs:

  deploy:
    name: Build & Push Docker image
    runs-on: self-hosted

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Download artifact napaka
        uses: actions/download-artifact@v4
        with:
          name: napaka

      - name: Check napaka.txt
        run: |
          ls -la
          cat napaka.txt

          if grep -q "TESTI MANJKAJO" napaka.txt; then
            echo "CI failed -> deploy blocked"
            exit 1
          fi

      - name: Login v DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/moja-aplikacija:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/moja-aplikacija:latest