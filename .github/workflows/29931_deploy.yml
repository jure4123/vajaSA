name: 29931_deploy

on:
  workflow_run:
    workflows: ["29931_test"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact iz test workflowa
        run: |
          mkdir artifacts
          gh run download ${{ github.event.workflow_run.id }} -n napaka -D artifacts

      - name: Preveri napako
        run: |
          if [ -s artifacts/napaka.txt ]; then
            echo "Napaka v testih:"
            cat artifacts/napaka.txt
            exit 1
          fi

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/moja-app:latest .

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/moja-app:latest